      summary: Story
      description: One story by slug (YYYY-MM-DD-slug); `include=content` adds the full markdown body.
      parameters:
        - $ref: '#/components/parameters/Slug'
        - $ref: '#/components/parameters/Include'
      responses:
        '200':
