                    type: object
                    properties:
                      total: { type: integer }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/ContactOption' }
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: Optional — raises rate limits above the keyless free tier.
  parameters:
    Q:
      name: q
      in: query
      description: Free-text query over title, summary, tags, and body.
      schema: { type: string }
    Tags:
      name: tags
      in: query
      description: Comma-separated tag slugs.
      schema: { type: string }
    Match:
      name: match
      in: query
      description: Tag match mode.
      schema: { type: string, enum: [any, all], default: any }
    Sort:
      name: sort
      in: query
      schema: { type: string, enum: [default, title, date] }
    Fields:
      name: fields
      in: query
      description: Comma-separated sparse field projection.
      schema: { type: string, example: 'slug,title,url' }
    Page:
      name: page
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
    Slug:
      name: slug
      in: path
      required: true
      schema: { type: string }
    Include:
      name: include
      in: query
      description: Set to `content` to inline the full markdown body (up to 200 KB).
      schema: { type: string, enum: [content] }
  responses:
    NotFound:
      description: No such resource.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
  schemas:
    Doc:
      type: object
      description: One network resource. Extra type-specific fields (guest, outline, party, …) appear per type.
      properties:
        type: { type: string }
        slug: { type: string }
        title: { type: string }
        summary: { type: string }
        url: { type: string, format: uri }
        tags:
          type: array
          items: { type: string }
        date: { type: string }
        content: { type: string, description: 'Full markdown body when include=content.' }
      additionalProperties: true
    Area:
      allOf:
        - $ref: '#/components/schemas/Doc'
        - type: object
          properties:
            related:
              type: array
              items:
                type: object
                properties:
                  slug: { type: string }
                  title: { type: string }
                  url: { type: string, format: uri }
                  summary: { type: string }
    PagedEnvelope:
      type: object
      properties:
        meta:
          type: object
          properties:
            total: { type: integer }
            page: { type: integer }
            limit: { type: integer }
            pages: { type: integer }
            query: { type: object, additionalProperties: true }
        data:
          type: array
          items: { $ref: '#/components/schemas/Doc' }
    SearchEnvelope:
      allOf:
        - $ref: '#/components/schemas/PagedEnvelope'
        - type: object
          properties:
            meta:
              type: object
              properties:
                facets:
                  type: object
                  properties:
                    types:
                      type: object
                      additionalProperties: { type: integer }
    Engage:
      type: object
      properties:
        email: { type: string, format: email }
        services_url: { type: string, format: uri }
        newsletter: { type: string, format: uri }
    ContactOption:
      type: object
      properties:
        channel: { type: string, description: 'Machine-readable channel key (email, form, newsletter, github, linkedin, bluesky, youtube, mail).' }
        label: { type: string }
        value: { type: string, description: 'The address itself, where the channel is not a URL.' }
        url: { type: string }
        description: { type: string }
    Error:
      type: object
      properties:
        error: { type: string }
        detail: { type: string }
