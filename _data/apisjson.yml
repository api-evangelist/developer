aid: api-evangelist-developer
specificationVersion: '0.20'
type: Index
name: API Evangelist Developer Portal
description: >-
  Static JSON feeds for the API Evangelist network — APIs, posts, policies, rules,
  properties, schema, standards, strategies, guidance, conversations, experiences,
  contracts, partners, utilities, videos, and vocabularies. Everything Kin Lane
  publishes across api-evangelist sites, surfaced as feeds that are easy to consume.

